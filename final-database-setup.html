<!DOCTYPE html>
<html>
<head>
    <title>Final Database Setup</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Final Database Setup - Wishlist, Cart, Notifications</h1>
    <div id="output"></div>
    <button onclick="setupDatabase()">Setup Database</button>
    <button onclick="testTables()">Test Tables</button>

    <script>
        const supabaseUrl = 'https://kiwtbssgteuszyckttyq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtpd3Ric3NndGV1c3p5Y2t0dHlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTUwMjcsImV4cCI6MjA5MDczMTAyN30.pmcCxFvVAJvkzNGTUUudz7nq72tCclV9cJZ01keForY';
        
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        function log(message) {
            document.getElementById('output').innerHTML += '<p>' + message + '</p>';
            console.log(message);
        }

        async function setupDatabase() {
            try {
                log('🚀 Starting comprehensive database setup...');

                // Step 1: Drop existing tables if they exist
                log('Step 1: Cleaning up existing tables...');
                const dropCommands = [
                    'DROP TABLE IF EXISTS public.wishlist_items CASCADE;',
                    'DROP TABLE IF EXISTS public.cart_items CASCADE;',
                    'DROP TABLE IF EXISTS public.notifications CASCADE;'
                ];

                for (const dropSql of dropCommands) {
                    try {
                        const { error } = await supabase.rpc('exec_sql', { sql: dropSql });
                        if (error) {
                            log('Drop warning: ' + error.message);
                        }
                    } catch (e) {
                        log('Drop warning: ' + e.message);
                    }
                }
                log('✅ Cleanup completed');

                // Step 2: Create wishlist_items table
                log('Step 2: Creating wishlist_items table...');
                const wishlistSql = `
                    CREATE TABLE public.wishlist_items (
                        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
                        user_id UUID NOT NULL REFERENCES public.profiles(id) ON DELETE CASCADE,
                        listing_id UUID NOT NULL REFERENCES public.supplier_listings(id) ON DELETE CASCADE,
                        created_at TIMESTAMPTZ DEFAULT NOW(),
                        CONSTRAINT unique_user_listing_wishlist UNIQUE(user_id, listing_id)
                    );
                `;
                
                const { error: wishlistError } = await supabase.rpc('exec_sql', { sql: wishlistSql });
                if (wishlistError) {
                    log('❌ Wishlist table error: ' + JSON.stringify(wishlistError));
                    throw wishlistError;
                } else {
                    log('✅ Wishlist table created successfully');
                }

                // Step 3: Create cart_items table
                log('Step 3: Creating cart_items table...');
                const cartSql = `
                    CREATE TABLE public.cart_items (
                        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
                        user_id UUID NOT NULL REFERENCES public.profiles(id) ON DELETE CASCADE,
                        listing_id UUID NOT NULL REFERENCES public.supplier_listings(id) ON DELETE CASCADE,
                        quantity DECIMAL(10, 2) NOT NULL DEFAULT 1 CHECK (quantity > 0),
                        notes TEXT,
                        created_at TIMESTAMPTZ DEFAULT NOW(),
                        updated_at TIMESTAMPTZ DEFAULT NOW(),
                        CONSTRAINT unique_user_listing_cart UNIQUE(user_id, listing_id)
                    );
                `;
                
                const { error: cartError } = await supabase.rpc('exec_sql', { sql: cartSql });
                if (cartError) {
                    log('❌ Cart table error: ' + JSON.stringify(cartError));
                    throw cartError;
                } else {
                    log('✅ Cart table created successfully');
                }

                // Step 4: Create notifications table
                log('Step 4: Creating notifications table...');
                const notificationsSql = `
                    CREATE TABLE public.notifications (
                        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
                        user_id UUID NOT NULL REFERENCES public.profiles(id) ON DELETE CASCADE,
                        type VARCHAR(50) NOT NULL,
                        title VARCHAR(200) NOT NULL,
                        message TEXT NOT NULL,
                        data JSONB DEFAULT '{}',
                        read BOOLEAN DEFAULT FALSE,
                        read_at TIMESTAMPTZ,
                        created_at TIMESTAMPTZ DEFAULT NOW()
                    );
                `;
                
                const { error: notificationsError } = await supabase.rpc('exec_sql', { sql: notificationsSql });
                if (notificationsError) {
                    log('❌ Notifications table error: ' + JSON.stringify(notificationsError));
                    throw notificationsError;
                } else {
                    log('✅ Notifications table created successfully');
                }

                // Step 5: Create indexes for performance
                log('Step 5: Creating performance indexes...');
                const indexes = [
                    'CREATE INDEX IF NOT EXISTS idx_wishlist_user_id ON public.wishlist_items(user_id);',
                    'CREATE INDEX IF NOT EXISTS idx_wishlist_listing_id ON public.wishlist_items(listing_id);',
                    'CREATE INDEX IF NOT EXISTS idx_cart_user_id ON public.cart_items(user_id);',
                    'CREATE INDEX IF NOT EXISTS idx_cart_listing_id ON public.cart_items(listing_id);',
                    'CREATE INDEX IF NOT EXISTS idx_notifications_user_id ON public.notifications(user_id);',
                    'CREATE INDEX IF NOT EXISTS idx_notifications_read ON public.notifications(read);',
                    'CREATE INDEX IF NOT EXISTS idx_notifications_type ON public.notifications(type);',
                    'CREATE INDEX IF NOT EXISTS idx_notifications_created_at ON public.notifications(created_at);'
                ];

                for (const indexSql of indexes) {
                    const { error } = await supabase.rpc('exec_sql', { sql: indexSql });
                    if (error) {
                        log('Index warning: ' + error.message);
                    }
                }
                log('✅ Indexes created successfully');

                // Step 6: Enable Row Level Security
                log('Step 6: Enabling Row Level Security...');
                const rlsCommands = [
                    'ALTER TABLE public.wishlist_items ENABLE ROW LEVEL SECURITY;',
                    'ALTER TABLE public.cart_items ENABLE ROW LEVEL SECURITY;',
                    'ALTER TABLE public.notifications ENABLE ROW LEVEL SECURITY;'
                ];

                for (const rlsSql of rlsCommands) {
                    const { error } = await supabase.rpc('exec_sql', { sql: rlsSql });
                    if (error) {
                        log('RLS warning: ' + error.message);
                    }
                }
                log('✅ RLS enabled successfully');

                // Step 7: Create RLS policies
                log('Step 7: Creating RLS policies...');
                const policies = [
                    // Wishlist policies
                    `CREATE POLICY "wishlist_select_own" ON public.wishlist_items FOR SELECT USING (auth.uid() = user_id);`,
                    `CREATE POLICY "wishlist_insert_own" ON public.wishlist_items FOR INSERT WITH CHECK (auth.uid() = user_id);`,
                    `CREATE POLICY "wishlist_delete_own" ON public.wishlist_items FOR DELETE USING (auth.uid() = user_id);`,
                    
                    // Cart policies
                    `CREATE POLICY "cart_select_own" ON public.cart_items FOR SELECT USING (auth.uid() = user_id);`,
                    `CREATE POLICY "cart_insert_own" ON public.cart_items FOR INSERT WITH CHECK (auth.uid() = user_id);`,
                    `CREATE POLICY "cart_update_own" ON public.cart_items FOR UPDATE USING (auth.uid() = user_id);`,
                    `CREATE POLICY "cart_delete_own" ON public.cart_items FOR DELETE USING (auth.uid() = user_id);`,
                    
                    // Notification policies
                    `CREATE POLICY "notifications_select_own" ON public.notifications FOR SELECT USING (auth.uid() = user_id);`,
                    `CREATE POLICY "notifications_update_own" ON public.notifications FOR UPDATE USING (auth.uid() = user_id);`
                ];

                for (const policySql of policies) {
                    try {
                        const { error } = await supabase.rpc('exec_sql', { sql: policySql });
                        if (error && !error.message.includes('already exists')) {
                            log('Policy warning: ' + error.message);
                        }
                    } catch (e) {
                        if (!e.message.includes('already exists')) {
                            log('Policy warning: ' + e.message);
                        }
                    }
                }
                log('✅ RLS policies created successfully');

                // Step 8: Create triggers
                log('Step 8: Creating triggers...');
                const triggerSql = `
                    -- Create or replace the trigger function
                    CREATE OR REPLACE FUNCTION update_updated_at_column()
                    RETURNS TRIGGER AS $$
                    BEGIN
                        NEW.updated_at = NOW();
                        RETURN NEW;
                    END;
                    $$ language 'plpgsql';

                    -- Drop trigger if exists and recreate
                    DROP TRIGGER IF EXISTS update_cart_items_updated_at ON public.cart_items;
                    CREATE TRIGGER update_cart_items_updated_at 
                        BEFORE UPDATE ON public.cart_items 
                        FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();
                `;
                
                const { error: triggerError } = await supabase.rpc('exec_sql', { sql: triggerSql });
                if (triggerError) {
                    log('Trigger warning: ' + triggerError.message);
                } else {
                    log('✅ Triggers created successfully');
                }

                log('🎉 Database setup completed successfully!');
                
                // Step 9: Test the setup
                await testTables();

            } catch (error) {
                log('❌ Setup failed: ' + error.message);
                console.error('Full error:', error);
            }
        }

        async function testTables() {
            try {
                log('🧪 Testing database tables...');

                // Test wishlist_items table
                const { data: wishlistData, error: wishlistError } = await supabase
                    .from('wishlist_items')
                    .select('*')
                    .limit(1);
                
                if (wishlistError) {
                    log('❌ Wishlist test failed: ' + JSON.stringify(wishlistError));
                } else {
                    log('✅ Wishlist table accessible (' + (wishlistData?.length || 0) + ' items)');
                }

                // Test cart_items table
                const { data: cartData, error: cartError } = await supabase
                    .from('cart_items')
                    .select('*')
                    .limit(1);
                
                if (cartError) {
                    log('❌ Cart test failed: ' + JSON.stringify(cartError));
                } else {
                    log('✅ Cart table accessible (' + (cartData?.length || 0) + ' items)');
                }

                // Test notifications table
                const { data: notifData, error: notifError } = await supabase
                    .from('notifications')
                    .select('*')
                    .limit(1);
                
                if (notifError) {
                    log('❌ Notifications test failed: ' + JSON.stringify(notifError));
                } else {
                    log('✅ Notifications table accessible (' + (notifData?.length || 0) + ' items)');
                }

                // Test with joins
                log('Testing table joins...');
                const { data: joinData, error: joinError } = await supabase
                    .from('wishlist_items')
                    .select(`
                        *,
                        listing:supplier_listings(
                            *,
                            material:materials(*)
                        )
                    `)
                    .limit(1);
                
                if (joinError) {
                    log('❌ Join test failed: ' + JSON.stringify(joinError));
                } else {
                    log('✅ Table joins working correctly');
                }

                log('🎉 All tests completed!');

            } catch (error) {
                log('❌ Testing failed: ' + error.message);
            }
        }

        // Auto-run setup on page load
        window.addEventListener('load', () => {
            log('Page loaded. Click "Setup Database" to begin.');
        });
    </script>
</body>
</html>
